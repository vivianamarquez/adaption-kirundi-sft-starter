language_adherence:
  prompts_path: configs/language_adherence_prompts.jsonl
  output_path: results/eval/language_adherence.csv
  language_id_model: UBC-NLP/afrolid_1.5
  kirundi_label_prefixes:
    - run
    - rn

kirnews_classification:
  dataset_id: andreniyongabo/kinnews_kirnews
  dataset_config: kirnews_raw
  split: test
  sample_size: 100
  output_path: results/eval/kirnews_classification.csv
  labels:
    - politics
    - sport
    - economy
    - health
    - entertainment
    - history
    - technology
    - tourism
    - culture
    - fashion
    - religion
    - environment
    - education
    - relationship
