input_path: data/processed/kakugo_adaption_input.csv
output_path: data/adapted/kakugo_adapted.csv
metadata_path: results/adaption_run_metadata.json
diagnosis_path: results/adaption_dataset_diagnosis.json
evaluation_path: results/adaption_dataset_evaluation.json

dataset_name: kakugo-run-kirundi-adaption-run
ingestion_timeout_seconds: 120

column_mapping:
  prompt: instruction
  completion: response

adaptation_job:
  # null means use the row_count that Adaption reports after upload.
  max_rows: null
  timeout_seconds: null

full_run:
  max_rows: null
  timeout_seconds: null

run_controls:
  estimate_first: true
  run_full_by_default: false
